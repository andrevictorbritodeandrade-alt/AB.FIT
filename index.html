    <meta name="apple-mobile-web-app-title" content="ABFIT">
    
    <!-- Ícone para iOS (Fundamental para não ficar como screenshot de página) -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='0' fill='%23000000'/%3E%3Ctext x='50%25' y='42%25' font-family='Arial, sans-serif' font-weight='900' font-size='200' fill='%23dc2626' text-anchor='middle' dominant-baseline='middle' letter-spacing='-10'%3EAB%3C/text%3E%3Cpath d='M140 340 L372 340 M140 300 L140 380 M120 310 L120 370 M372 300 L372 380 M392 310 L392 370' stroke='%23dc2626' stroke-width='24' stroke-linecap='round'/%3E%3C/svg%3E">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="application-name" content="ABFIT">
    
    <link rel="manifest" href="manifest.json" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              border: "hsl(var(--border))",
              input: "hsl(var(--input))",
              ring: "hsl(var(--ring))",
              background: "hsl(var(--background))",
              foreground: "hsl(var(--foreground))",
              primary: {
                DEFAULT: "hsl(var(--primary))",
                foreground: "hsl(var(--primary-foreground))",
              },
              secondary: {
                DEFAULT: "hsl(var(--secondary))",
                foreground: "hsl(var(--secondary-foreground))",
              },
              destructive: {
                DEFAULT: "hsl(var(--destructive))",
                foreground: "hsl(var(--destructive-foreground))",
              },
              muted: {
                DEFAULT: "hsl(var(--muted))",
                foreground: "hsl(var(--muted-foreground))",
              },
              accent: {
                DEFAULT: "hsl(var(--accent))",
                foreground: "hsl(var(--accent-foreground))",
              },
              popover: {
                DEFAULT: "hsl(var(--popover))",
                foreground: "hsl(var(--popover-foreground))",
              },
              card: {
                DEFAULT: "hsl(var(--card))",
                foreground: "hsl(var(--card-foreground))",
              },
            },
            borderRadius: {
              lg: "var(--radius)",
              md: "calc(var(--radius) - 2px)",
              sm: "calc(var(--radius) - 4px)",
            },
          },
        },
      }
    </script>
    <script>
        window.process = { env: { API_KEY: "" } }; // API_KEY é injetada via ambiente
        window.__app_id = "chaveunica-225e0";

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js').then(reg => {
                    console.log('SW registered:', reg);
                }).catch(err => console.log('SW registration failed:', err));
            });
        }
    </script>
    <style>
      :root {
        --font-main: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        
        /* Default Dark Theme (matching current app) */
        --background: 0 0% 0%;
        --foreground: 0 0% 100%;
        --card: 240 5.9% 10%; /* zinc-900 approx */
        --card-foreground: 0 0% 100%;
        --popover: 240 5.9% 10%;
        --popover-foreground: 0 0% 100%;
        --primary: 0 72.2% 50.6%; /* red-600 */
        --primary-foreground: 0 0% 100%;
        --secondary: 240 3.7% 15.9%; /* zinc-800 */
        --secondary-foreground: 0 0% 100%;
        --muted: 240 3.7% 15.9%;
        --muted-foreground: 240 5% 64.9%; /* zinc-400 */
        --accent: 240 3.7% 15.9%;
        --accent-foreground: 0 0% 100%;
        --destructive: 0 62.8% 30.6%;
        --destructive-foreground: 0 0% 100%;
        --border: 240 3.7% 15.9%;
        --input: 240 3.7% 15.9%;
        --ring: 0 72.2% 50.6%;
        --radius: 0.5rem;
      }

      .light {
        --background: 0 0% 100%;
        --foreground: 240 10% 3.9%;
        --card: 0 0% 100%;
        --card-foreground: 240 10% 3.9%;
        --popover: 0 0% 100%;
        --popover-foreground: 240 10% 3.9%;
        --primary: 0 72.2% 50.6%;
        --primary-foreground: 0 0% 100%;
        --secondary: 240 4.8% 95.9%;
        --secondary-foreground: 240 5.9% 10%;
        --muted: 240 4.8% 95.9%;
        --muted-foreground: 240 3.8% 46.1%;
        --accent: 240 4.8% 95.9%;
        --accent-foreground: 240 5.9% 10%;
        --destructive: 0 84.2% 60.2%;
        --destructive-foreground: 0 0% 98%;
        --border: 240 5.9% 90%;
        --input: 240 5.9% 90%;
        --ring: 0 72.2% 50.6%;
      }

      html, body { 
        background-color: hsl(var(--background)); 
        color: hsl(var(--foreground)); 
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        overflow: hidden;
        position: fixed;
        font-family: var(--font-main);
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      #root {
        height: 100%;
        width: 100%;
        overflow-y: auto;
        overscroll-behavior-y: none;
      }
      .custom-scrollbar::-webkit-scrollbar { width: 6px; }
      .custom-scrollbar::-webkit-scrollbar-track { background: hsl(var(--secondary)); }
      .custom-scrollbar::-webkit-scrollbar-thumb { background: hsl(var(--primary)); border-radius: 10px; }
    </style>

    <script>
      window.addEventListener('error', function(event) {
        document.body.innerHTML = '<div style="color: red; padding: 20px; font-family: monospace; background: black; height: 100vh; overflow: auto; z-index: 9999; position: relative;"><h2>App Crashed</h2><pre>' + (event.error ? event.error.stack : event.message) + '</pre></div>';
      });
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML = '<div style="color: red; padding: 20px; font-family: monospace; background: black; height: 100vh; overflow: auto; z-index: 9999; position: relative;"><h2>Unhandled Promise Rejection</h2><pre>' + (event.reason ? event.reason.stack || event.reason : 'Unknown error') + '</pre></div>';
      });
    </script>
</head>
